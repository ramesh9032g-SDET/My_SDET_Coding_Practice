services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-docker-desktop
    privileged: true
    user: root  # This ensures Jenkins can access the mounted socket
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      # This is the "magic" line that connects Jenkins to your host Docker
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always

volumes:
  jenkins_home: