name: Java CI Pipeline

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - run: mvn clean test
